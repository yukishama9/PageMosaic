# Site metadata
title: PageMosaic
description: Visual static-site editor — edit reusable components once, sync across every page, manage multi-language content
author: Helios Shen
repository: https://github.com/yukishama9/PageMosaic
url: https://yukishama9.github.io
baseurl: /PageMosaic

# GitHub Pages settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# No theme — using custom _layouts/

# Timezone
timezone: Asia/Hong_Kong

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - page-templates/
